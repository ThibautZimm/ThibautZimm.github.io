<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bonne Saint-Valentin</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">
    <h1> C'est le moment d'aller glisser dans une zone zen 🧘 </h1>

  <p>La troisième énigme est : <strong> L'hexagone s'inscrit dans une certaine couleur, laquelle est-ce ? </strong></p>

    <input type="password" id="password" placeholder="Mot de passe">
    <button onclick="verifier()">Valider</button>

    <p id="message"></p>
  </div>

  <script>
    function verifier() {
      const mdp = document.getElementById("password").value;
      if (mdp === "les3brasseurs") {
        window.location.href = "page4.html";
      } else {
        document.getElementById("message").innerText =
          "Ce n’est pas la bonne réponse 💭";
      }
    }
  </script>

</body>
</html>
